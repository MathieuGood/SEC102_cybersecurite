<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>$title$</title>
$for(css)$
  <link rel="stylesheet" href="$css$">
$endfor$
</head>
<body>

<div class="cover">
  <img class="cnam-logo" src="$logo$" alt="CNAM">
  <div class="cover-rule"></div>
  <h1 class="cover-title">$title$</h1>
  <div class="cover-meta">
$if(subject)$
    <p>$subject$</p>
$endif$
$for(author)$
    <p>$author$</p>
$endfor$
$if(date)$
    <p>$date$</p>
$endif$
  </div>
</div>

<div class="content">
$body$
</div>

</body>
</html>
