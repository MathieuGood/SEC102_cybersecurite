<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>$title$</title>
$for(css)$
  <link rel="stylesheet" href="$css$">
$endfor$
</head>
<body>

<div class="running-footer">$subject$ — $for(author)$$author$$endfor$ — $year$</div>

<div class="doc-header">
  <div class="doc-header-left">
    <img class="cnam-logo" src="$logo$" alt="CNAM">
  </div>
  <div class="doc-header-right">
    <p class="doc-title">$title$</p>
    <p class="doc-meta">
$if(subject)$$subject$$endif$<br>
$for(author)$$author$$endfor$<br>
$if(date)$$date$$endif$
    </p>
  </div>
</div>
<div class="doc-header-rule"></div>

<div class="content">
$body$
</div>

</body>
</html>
